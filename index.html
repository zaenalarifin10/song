<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gacha Rekomendasi Lagu</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; text-align: center; }
        .points-box { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #e67e22; }
        .gacha-btn { padding: 15px 30px; font-size: 18px; background-color: #9b59b6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .gacha-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .preview-container { margin-top: 30px; padding: 20px; border: 2px dashed #3498db; display: none; border-radius: 8px; }
        .all-songs { margin-top: 40px; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 5px; }
        iframe { width: 100%; height: 315px; margin-top: 15px; border: none; }
        .nav-link { display: block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <h1>🎵 Gacha Rekomendasi Lagu 🎵</h1>
    
    <div class="points-box">Poin Kamu: <span id="points-display">100</span> LP</div>
    
    <button class="gacha-btn" id="gacha-button" onclick="doGacha()">Gacha Lagu (10 Poin)</button>

    <div class="preview-container" id="preview-box">
        <h3>🎉 Hasil Gacha: <span id="result-title">Judul Lagu</span> [<span id="result-category">Genre</span>]</h3>
        <div id="youtube-embed"></div>
    </div>

    <div class="all-songs">
        <h3>Daftar Semua Lagu di Database:</h3>
        <ul id="song-list"></ul>
    </div>

    <a class="nav-link" href="add.html">Tambah Lagu Baru di Sini</a>

    <script {timestamp="2026"}>
        // Inisialisasi Poin (Beri 100 jika belum pernah masuk)
        let currentPoints = localStorage.getItem('userPoints');
        if (currentPoints === null) {
            currentPoints = 100;
            localStorage.setItem('userPoints', currentPoints);
        } else {
            currentPoints = parseInt(currentPoints);
        }
        
        // Update tampilan poin di awal
        document.getElementById('points-display').textContent = currentPoints;

        // Ambil data database lagu dari LocalStorage
        const songDatabase = JSON.parse(localStorage.getItem('songDatabase')) || [];

        // Tampilkan semua lagu ke dalam list index
        const songListEl = document.getElementById('song-list');
        if (songDatabase.length === 0) {
            songListEl.innerHTML = "<li>Belum ada lagu. Silakan tambah data lewat halaman add.html dulu!</li>";
        } else {
            songDatabase.forEach(song => {
                let li = document.createElement('li');
                li.textContent = `${song.title} (${song.category})`;
                songListEl.appendChild(li);
            });
        }

        // Fungsi Gacha
        function doGacha() {
            if (songDatabase.length === 0) {
                alert('Database kosong! Tambahkan lagu terlebih dahulu di halaman add.html.');
                return;
            }

            if (currentPoints < 10) {
                alert('Poin kamu habis! Tidak bisa melakukan gacha.');
                return;
            }

            // Kurangi poin
            currentPoints -= 10;
            localStorage.setItem('userPoints', currentPoints);
            document.getElementById('points-display').textContent = currentPoints;

            // Pilih lagu secara acak (Random)
            const randomIndex = Math.floor(Math.random() * songDatabase.length);
            const chosenSong = songDatabase[randomIndex];

            // Tampilkan hasil dan embed youtube
            document.getElementById('result-title').textContent = chosenSong.title;
            document.getElementById('result-category').textContent = chosenSong.category;
            
            const embedBox = document.getElementById('youtube-embed');
            embedBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${chosenSong.videoId}" allowfullscreen></iframe>`;
            
            document.getElementById('preview-box').style.display = 'block';

            // Cek jika poin habis setelah gacha ini
            if (currentPoints < 10) {
                document.getElementById('gacha-button').disabled = true;
            }
        }

        // Kunci tombol gacha dari awal jika poin memang sudah di bawah 10
        if (currentPoints < 10) {
            document.getElementById('gacha-button').disabled = true;
        }
    </script>
</body>
</html>
