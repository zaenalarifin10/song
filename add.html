<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Rekomendasi Lagu</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .nav-link { display: block; margin-top: 15px; text-align: center; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <h2>Tambah Lagu Gacha</h2>
    
    <div class="form-group">
        <label for="title">Judul Lagu / Penyanyi:</label>
        <input type="text" id="title" placeholder="Contoh: Sparkle - Radwimps">
    </div>

    <div class="form-group">
        <label for="category">Genre / Kategori:</label>
        <select id="category">
            <option value="Anime">Anime</option>
            <option value="J-Pop">J-Pop</option>
            <option value="Chill">Chill / Lofi</option>
            <option value="Rock">Rock</option>
        </select>
    </div>

    <div class="form-group">
        <label for="url">Link URL YouTube:</label>
        <input type="url" id="url" placeholder="Contoh: https://www.youtube.com/watch?v=a2GujJZfall">
    </div>

    <button onclick="saveData()">Tambahkan ke Database</button>

    <a class="nav-link" href="index.html">Ke Halaman Gacha (Index)</a>

    <script>
        function extractVideoId(url) {
            // Fungsi untuk mengambil ID Video YouTube agar bisa di-embed
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function saveData() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const url = document.getElementById('url').value;
            const videoId = extractVideoId(url);

            if (!title || !url) {
                alert('Semua data (kecuali kategori) wajib diisi!');
                return;
            }

            if (!videoId) {
                alert('URL YouTube tidak valid!');
                return;
            }

            // Ambil data lama dari localStorage, jika belum ada buat array kosong
            let songDatabase = JSON.parse(localStorage.getItem('songDatabase')) || [];

            // Tambahkan data baru
            songDatabase.push({ title, category, videoId });

            // Simpan kembali ke localStorage
            localStorage.setItem('songDatabase', JSON.stringify(songDatabase));

            alert('Lagu berhasil ditambahkan!');
            
            // Reset form
            document.getElementById('title').value = '';
            document.getElementById('url').value = '';
        }
    </script>
</body>
  </html>
